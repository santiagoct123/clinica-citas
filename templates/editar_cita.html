<!DOCTYPE html>
<html>
<head>
    <title>Editar cita</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/admin">Admin</a>
</nav>

<div class="container">
    <h2>Editar cita</h2>

    <form method="POST">
        <input type="date" name="fecha" value="{{ cita.fecha }}" required>
        <input type="time" name="hora" value="{{ cita.hora }}" required>

<select name="medico">
    <option value="Dr. Pérez - Medicina General">Dr. Pérez - Medicina General</option>
    <option value="Dra. Gómez - Pediatría">Dra. Gómez - Pediatría</option>
    <option value="Dr. Rodríguez - Odontología">Dr. Rodríguez - Odontología</option>
    <option value="Dra. Martínez - Dermatología">Dra. Martínez - Dermatología</option>
    <option value="Dr. López - Cardiología">Dr. López - Cardiología</option>
    <option value="Dra. Ramírez - Ginecología">Dra. Ramírez - Ginecología</option>
</select>

        <button type="submit">Guardar cambios</button>
    </form>
</div>

</body>
</html>
