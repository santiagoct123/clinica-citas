<!DOCTYPE html>
<html>
<head>
    <title>Editar cita</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/admin">Admin</a>
</nav>

<div class="container">
    <h2>Editar cita</h2>

    <form method="POST">
        <input type="date" name="fecha" value="{{ cita.fecha }}" required>
        <input type="time" name="hora" value="{{ cita.hora }}" required>

        <select name="medico">
            <option value="Dr. Pérez">Dr. Pérez</option>
            <option value="Dra. Gómez">Dra. Gómez</option>
            <option value="Dr. Rodríguez">Dr. Rodríguez</option>
        </select>

        <button type="submit">Guardar cambios</button>
    </form>
</div>

</body>
</html>
